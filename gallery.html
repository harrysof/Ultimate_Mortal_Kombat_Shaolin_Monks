<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKSM Gallery</title>
  <link rel="icon" type="image/png" href="assets/misc/mklogogallery.png">
  <style>
    :root {
      --blood: #8b0000;
      --blood-bright: #cc0000;
      --gold: #c9a84c;
      --gold-dim: #7a5c1e;
      --bone: #e8dcc8;
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background-color: #0a0a0a;
      color: var(--bone);
    }

    /* FIXED HEADER */
    .gallery-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color: #111;
      border-bottom: 2px solid var(--gold-dim);
      z-index: 100;
      height: 60px;
    }

    .header-spacer {
      height: 92px;
    }

    .gallery-title {
      color: var(--gold);
      font-size: 2rem;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #222;
      border: 1px solid var(--blood);
      color: var(--bone);
      font-size: 1rem;
      text-transform: uppercase;
      text-decoration: none;
    }

    .back-btn:hover {
      background-color: var(--blood);
      color: #fff;
    }

    /* GRID */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 1024px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-header { flex-direction: column; height: auto; padding: 1rem; gap: 0.5rem;}
      .header-spacer { height: 120px; }
      .gallery-title { font-size: 1.5rem; }
    }

    /* GALLERY ITEM (STRICT PERFORMANCE) */
    .gallery-item {
      position: relative;
      cursor: pointer;
      background-color: #000;
      border: 4px solid var(--gold-dim);
      box-shadow: 0 0 0 4px #000, 0 0 0 6px var(--blood);
      aspect-ratio: 3/4;
      overflow: hidden;
      
      /* PERFORMANCE BOOSTS */
      content-visibility: auto;
      contain: layout style paint;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      image-rendering: auto;
    }

    .item-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: rgba(0, 0, 0, 0.85);
      padding: 1rem;
      text-align: center;
      color: var(--gold);
      font-size: 1.2rem;
      text-transform: uppercase;
      z-index: 2;
    }

    /* LIGHTBOX (INSTANT) */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #000;
      z-index: 9999;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox-content {
      position: relative;
      max-width: 95vw;
      max-height: 95vh;
      border: 2px solid var(--gold-dim);
    }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      display: block;
      object-fit: contain;
      image-rendering: auto;
    }

    .lightbox-close {
      position: absolute;
      top: -30px;
      right: 0;
      color: var(--bone);
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }
  </style>
</head>
<body>

  <header class="gallery-header">
    <a href="index.html" class="back-btn">&#8592; RETURN TO ROSTER</a>
    <h1 class="gallery-title">MKSM GALLERY</h1>
    <div style="width: 150px;" class="desktop-spacer"></div>
  </header>
  
  <div class="header-spacer"></div>

  <div class="gallery-grid" id="galleryGrid">
    <!-- Items generated here -->
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&#10006;</button>
      <img id="lightboxImg" src="" alt="Fullscreen asset">
    </div>
  </div>

  <script>
    const ASSET_PATH = 'assets/Full_Body_Shots/';
    const IMAGES = [
      // STORY / MAIN CHARACTERS
      "Liu_kang.jpeg", "Kung_lao.jpeg", "Raiden.jpeg", "Johnny Cage.jpeg", "Sonya.jpeg", "Jax.jpeg", 
      "Sub-zero.jpeg", "Scorpion.jpeg", "Reptile.jpeg", "Baraka.jpeg", "Mileena.jpeg", "Kitana.jpeg", 
      "Jade.jpeg", "Shang_tsung.jpeg", "Goro.jpeg", "Kintaro.jpeg", "Shao_kahn.jpeg", 
      "Smoke.jpeg", "Noob_Saibot.jpeg", "Rain.jpeg", "Kano.jpeg", "Hell_Scorpion.jpeg", 
      
      // BOSS CHARACTERS
      "Ermac.jpeg", "Orochi_Hellbeast.jpeg",
      
      // ENEMIES
      "Black_Dragon_Merc.jpeg", "Bloody_Skeleton.jpeg", "Brother_of_Shadow.jpeg", "Canon_Demon.jpeg", 
      "Clay_Soldier.jpeg", "Demon_Archer.jpeg", "Demon_Captain.jpeg", "Demon_General.jpeg", 
      "Demon_Handler.jpeg", "Kabal.jpeg", "Kaijin.jpeg", "Mask_Guard.jpeg", "Oni.jpeg", 
      "Oni_Warlord.jpeg", "Red_Dragon_Merc.jpeg", "Shadow_Priest.jpeg", "Shokan.jpeg", 
      "Tarkata.jpeg", "Undead_Corpse.jpeg"
    ];

    function formatName(filename) {
      return filename.replace('.jpeg', '').replace(/_/g, ' ');
    }

    const grid = document.getElementById('galleryGrid');

    IMAGES.forEach(file => {
      const name = formatName(file);
      const div = document.createElement('div');
      div.className = 'gallery-item';
      div.onclick = () => openLightbox(ASSET_PATH + file);
      
      div.innerHTML = `
        <img src="${ASSET_PATH}${file}" alt="${name}" loading="lazy">
        <div class="item-label">${name}</div>
      `;
      grid.appendChild(div);
    });

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }

    lightbox.addEventListener('click', (e) => {
      if(e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
